# Release workflow for forge-api — amd64 leg.
#
# Builds + pushes linux/amd64 image to GHCR with `-amd64` tag suffix.
# Companion: release-arm64.yml + release-manifest.yml.
#
# Trigger model (2026-05-31, per the asset-bloat fix):
#   - schedule        : daily 06:00 UTC. Aggregates whatever commits landed
#                       since the last build into a single image. Skips
#                       when HEAD's short sha is already published.
#   - workflow_dispatch: manual "I need one now" escape. Always builds.
#   - push (tags only): v*.*.* semver tag pushes always build.
#
# Removed: `push: branches: [main]`. Per-commit GHCR image creation was
# producing too many tags + asset churn. CI (ci.yml) still runs on every
# push so test feedback stays fast; only the image-publish batches.

name: Release amd64

on:
  schedule:
    - cron: '0 6 * * *'    # 06:00 UTC daily
  workflow_dispatch:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read
  packages: read
  # write needed by build-and-push for the GHCR push.

concurrency:
  group: release-amd64-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Decides whether the scheduled run should proceed. Non-schedule
  # triggers (workflow_dispatch, tag push) always proceed.
  #
  # The idempotent check: compute HEAD's short sha + grep the package
  # versions API for a tag matching `main-<sha>-amd64`. If present,
  # the bits are already published — skip. Self-healing: a missing or
  # failed prior build leaves HEAD's tag absent, so the next schedule
  # builds.
  should-build:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      should: ${{ steps.check.outputs.should }}
      reason: ${{ steps.check.outputs.reason }}
    steps:
      - uses: actions/checkout@v4
      - name: Decide
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "should=true" >> "$GITHUB_OUTPUT"
            echo "reason=trigger=${{ github.event_name }} (non-schedule)" >> "$GITHUB_OUTPUT"
            echo "Non-schedule trigger — proceeding"
            exit 0
          fi
          short_sha=$(git rev-parse --short=7 HEAD)
          expected="main-${short_sha}-amd64"
          repo_name="${GITHUB_REPOSITORY##*/}"
          echo "Looking for prior image tag: ${expected}"
          tags=$(gh api --paginate \
              -H "Accept: application/vnd.github+json" \
              "/orgs/${GITHUB_REPOSITORY_OWNER}/packages/container/${repo_name}/versions" \
              --jq '.[].metadata.container.tags[]?' 2>/dev/null || true)
          if echo "$tags" | grep -Fxq "$expected"; then
            echo "should=false" >> "$GITHUB_OUTPUT"
            echo "reason=already-published sha=${short_sha}" >> "$GITHUB_OUTPUT"
            echo "Image for ${short_sha} already published — skipping scheduled build"
          else
            echo "should=true" >> "$GITHUB_OUTPUT"
            echo "reason=new-commits-since-last-build sha=${short_sha}" >> "$GITHUB_OUTPUT"
            echo "No prior image for ${short_sha} — proceeding"
          fi

  test:
    needs: should-build
    if: needs.should-build.outputs.should == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: forge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=forge_test;Username=postgres;Password=postgres"
      MockIntegrations: "true"
    steps:
      - uses: actions/checkout@v4
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore
      - name: Build (warnings-as-errors)
        run: dotnet build --no-restore --configuration Release -warnaserror
      - name: Unit + integration tests
        run: dotnet test --no-build --configuration Release

  build-and-push:
    needs: [should-build, test]
    if: needs.should-build.outputs.should == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version (auto-bump patch on main)
        id: version
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          base=$(tr -d '[:space:]' < VERSION 2>/dev/null || echo "0.0.0")
          IFS='.' read -r major minor base_patch <<< "$base"
          anchor=$(git log -1 --format=%H -- VERSION 2>/dev/null || echo "")
          if [[ -z "$anchor" ]]; then
            distance=0
          else
            distance=$(git rev-list --count "${anchor}..HEAD")
          fi
          patch=$((base_patch + distance))
          version="${major}.${minor}.${patch}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "minor=${major}.${minor}" >> "$GITHUB_OUTPUT"
          echo "Computed image version: ${version} (base=${base}, distance=${distance})"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (amd64-suffixed tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}-amd64,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.version.outputs.minor }}-amd64,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest-amd64,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=main-,suffix=-amd64,format=short,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}},suffix=-amd64
            type=semver,pattern={{major}}.{{minor}},suffix=-amd64
            type=semver,pattern={{major}},suffix=-amd64

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./forge.api/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,scope=amd64,mode=max
