# Release workflow for forge-api — arm64 leg.
#
# Builds + pushes linux/arm64 image to GHCR with `-arm64` tag suffix.
# Native arm64 runner. Companion: release-amd64.yml + release-manifest.yml.

name: Release arm64

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: release-arm64-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: forge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=forge_test;Username=postgres;Password=postgres"
      MockIntegrations: "true"
    steps:
      - uses: actions/checkout@v4
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore
        run: dotnet restore
      - name: Build (warnings-as-errors)
        run: dotnet build --no-restore --configuration Release -warnaserror
      - name: Unit + integration tests
        run: dotnet test --no-build --configuration Release

  build-and-push:
    needs: test
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version (auto-bump patch on main)
        id: version
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          base=$(tr -d '[:space:]' < VERSION 2>/dev/null || echo "0.0.0")
          IFS='.' read -r major minor base_patch <<< "$base"
          anchor=$(git log -1 --format=%H -- VERSION 2>/dev/null || echo "")
          if [[ -z "$anchor" ]]; then
            distance=0
          else
            distance=$(git rev-list --count "${anchor}..HEAD")
          fi
          patch=$((base_patch + distance))
          version="${major}.${minor}.${patch}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "minor=${major}.${minor}" >> "$GITHUB_OUTPUT"
          echo "Computed image version: ${version} (base=${base}, distance=${distance})"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (arm64-suffixed tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}-arm64,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.version.outputs.minor }}-arm64,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest-arm64,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=main-,suffix=-arm64,format=short,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}},suffix=-arm64
            type=semver,pattern={{major}}.{{minor}},suffix=-arm64
            type=semver,pattern={{major}},suffix=-arm64

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./forge.api/Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,scope=arm64,mode=max
