# Schema drift check — asserts the committed embedded schema is in sync with forge-db's source.
#
# Since the db cutover (2026-06-17), forge-api no longer uses EF migrations: it applies the
# declarative schema at boot via SchemaBootstrapper, reading the embedded
# `forge.data/Schema/forge-schema.sql`. That file is the assembled output of forge-db's `schema/`
# tree, so it MUST be regenerated whenever forge-db's schema changes:
#
#   forge-db assemble --repo <forge-db> --out forge.data/Schema/forge-schema.sql
#
# This job re-assembles forge-db and fails if the committed embedded SQL differs (i.e. someone
# changed forge-db's schema without regenerating the embedded artifact). The complementary
# invariant — that the EF model still maps cleanly onto this schema — is covered by the
# Postgres-backed test collection, which runs real queries against the schema this file produces.
#
# ACTIVATION: forge-db's schema/ tree currently lives on PR #1 (branch feat/db-project-scaffold),
# not yet on main. Until that merges, run this manually via "Run workflow" (workflow_dispatch) — set
# forge_db_ref to feat/db-project-scaffold. AFTER forge-db#1 merges, uncomment the pull_request/push
# triggers below to make it automatic (and optionally a required check — branch protection is off
# pre-beta).
#
# REQUIRES a read token for the separate forge-db repo: set secret FORGE_DB_RO_TOKEN (a fine-grained
# PAT or deploy key with read access to armoryworks/forge-db). If forge-db is public, delete the
# `token:` line on its checkout step.

name: Schema drift check

on:
  workflow_dispatch:
    inputs:
      forge_db_ref:
        description: forge-db ref to assemble the desired-state schema from
        default: main
        required: false
  # --- Uncomment after forge-db#1 merges to run automatically on schema/embedded-SQL changes: ---
  # pull_request:
  #   branches: [develop, main]
  #   paths: ['forge.data/Schema/**', 'forge.data/**', 'forge.core/**']
  # push:
  #   branches: [develop, main]
  #   paths: ['forge.data/Schema/**', 'forge.data/**', 'forge.core/**']

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  schema-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout forge-api
        uses: actions/checkout@v4

      - name: Checkout forge-db (desired-state schema)
        uses: actions/checkout@v4
        with:
          repository: armoryworks/forge-db
          ref: ${{ github.event.inputs.forge_db_ref || 'main' }}
          path: forge-db
          token: ${{ secrets.FORGE_DB_RO_TOKEN }}   # delete this line if forge-db is public

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Assemble forge-db desired state
        run: dotnet run --project forge-db/src/Forge.Db -c Release -- assemble --repo forge-db --out /tmp/forge-schema.sql

      - name: Assert embedded schema matches forge-db (fails on drift)
        run: |
          if ! diff -u forge.data/Schema/forge-schema.sql /tmp/forge-schema.sql; then
            echo "::error::Embedded schema forge.data/Schema/forge-schema.sql is stale vs forge-db."
            echo "::error::Regenerate it: forge-db assemble --repo <forge-db> --out forge.data/Schema/forge-schema.sql"
            exit 1
          fi
          echo "Embedded schema matches forge-db's schema/ tree."
